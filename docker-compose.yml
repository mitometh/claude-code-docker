services:
  claude:
    build:
      context: .
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
        CLAUDE_VERSION: "${CLAUDE_VERSION:-latest}"
        WITH_GO: "${WITH_GO:-0}"
        WITH_PYTHON: "${WITH_PYTHON:-0}"
        WITH_RUST: "${WITH_RUST:-0}"
        WITH_BUILD_ESSENTIAL: "${WITH_BUILD_ESSENTIAL:-0}"
        EXTRA_APT_PACKAGES: "${EXTRA_APT_PACKAGES:-}"
    image: claude-code:local
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - CLAUDE_CONFIG_DIR=/home/claude/.claude
    volumes:
      # Project folder — edits here affect your host folder.
      - ${WORKSPACE:-./workspace}:/workspace
      # Persistent subscription login (kept OUTSIDE the project).
      - ${CLAUDE_DOCKER_AUTH_DIR:-~/.claude-docker-auth}:/home/claude/.claude
      # Belt-and-suspenders: some Claude state lands under ~/.config/claude.
      - ${CLAUDE_DOCKER_AUTH_DIR:-~/.claude-docker-auth}/.config:/home/claude/.config/claude
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp:size=256m
      - /home/claude/.npm:size=256m
      - /home/claude/.cache:size=256m
      - /home/claude/go:size=512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 4g
    pids_limit: 512
